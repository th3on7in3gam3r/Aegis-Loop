# Aegis Loop — Render Blueprint
# Data persistence: set DATABASE_URL (e.g. free Neon Postgres) — the free
# instance has an ephemeral filesystem, so JSON-file storage is wiped on
# every deploy without it.
services:
  - type: web
    name: aegis-loop
    runtime: node
    branch: main
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_TEAM_PRICE_ID
        sync: false
      - key: AEGIS_OWNER_LOGINS
        sync: false
      - key: AEGIS_OWNER_PLAN
        sync: false
