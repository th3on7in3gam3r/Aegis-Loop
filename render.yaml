# Aegis Loop — Render Blueprint
# Custom domain: after purchase, set APP_URL in Dashboard and add Custom Domain (CNAME → your-app.onrender.com).
services:
  - type: web
    name: aegis-loop
    runtime: node
    branch: main
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AEGIS_DATA_DIR
        value: /opt/render/project/src/code/data
      - key: CONTACT_EMAIL
        sync: false
    disk:
      name: aegis-data
      mountPath: /opt/render/project/src/code/data
      sizeGB: 1
